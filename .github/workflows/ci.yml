name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true

      - name: Restore
        run: dotnet restore ProgrammaticMcp.sln

      - name: Build
        run: dotnet build ProgrammaticMcp.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test ProgrammaticMcp.sln --configuration Release --no-build --verbosity normal
